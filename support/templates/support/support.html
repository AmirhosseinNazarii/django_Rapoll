<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>پشتیبانی</title>
</head>
<body>
    <div class="container">
        <h1 class="text-center mt-5">پشتیبانی</h1>
        <div class="text-center mb-4">
            <a href="{% url 'send_ticket' %}" class="btn btn-success">تیکت جدید ثبت کنید</a>
        </div>
        
        <h3>لیست تیکت‌های شما</h3>
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>شماره تیکت</th>
                    <th>موضوع</th>
                    <th>وضعیت</th>
                    <th>عملیات</th>
                </tr>
            </thead>
            <tbody>
                {% for ticket in tickets %}
                <tr>
                    <td>{{ ticket.ticket_id }}</td>
                    <td>{{ ticket.subject }}</td>
                    <td>{{ ticket.get_status_display }}</td>
                    <td>
                        <a href="{% url 'ticket_detail' ticket.ticket_id %}" class="btn btn-primary">پیگیری</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
