<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>ارسال تیکت</title>
</head>
<body>
    <div class="container">
        <h1 class="text-center mt-5">ارسال تیکت</h1>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
                <label for="subject" class="form-label">موضوع تیکت</label>
                <select name="subject" class="form-select">
                    <option value="واریز">واریز</option>
                    <option value="خرید بلوک">خرید بلوک</option>
                    <option value="برداشت">برداشت</option>
                    <option value="مشکل فنی">مشکل فنی</option>
                    <option value="سایر موارد">سایر موارد</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="message" class="form-label">متن تیکت</label>
                <textarea name="message" class="form-control" maxlength="500" rows="5"></textarea>
            </div>
            <div class="mb-3">
                <label for="attachment" class="form-label">فایل پیوست (jpg, png, pdf - حداکثر 1MB)</label>
                <input type="file" name="attachment" class="form-control">
            </div>
            <button type="submit" class="btn btn-primary">ارسال</button>
        </form>
    </div>
</body>
</html>
