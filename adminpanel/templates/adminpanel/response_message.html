<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پیگیری تیکت</title>
    <!-- لینک به فایل‌های CSS بوت‌استرپ -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body dir="rtl" style="text-align: right;">
    <div class="container mt-5">
        <h1>تیکت شماره: {{ ticket.ticket_number }}</h1>
        <h3>موضوع: {{ ticket.subject }}</h3>
        
        <div class="mt-4">
            <h4>پیام‌ها:</h4>
            <ul class="list-group">
                {% for message in messages %}
                    <li class="list-group-item">
                        <strong>{{ message.user.username }}:</strong> 
                        <p>{{ message.message }}</p>
                        <small>تاریخ: {{ message.created_at }}</small>
                    </li>
                {% endfor %}
            </ul>
        </div>

        <!-- فرم برای ارسال پیام جدید -->
        <div class="mt-4">
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="message" class="form-label">پیام جدید:</label>
                    <textarea class="form-control" id="message" name="message" rows="3" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">ارسال پیام</button>
            </form>
        </div>
    </div>

    <!-- اسکریپت‌های جاوااسکریپت بوت‌استرپ -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
